<!doctype html>
<html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Agent UX Inspectability Checklist</title>
<style>
:root{color-scheme:dark;--bg:#090b12;--panel:#111827;--ink:#eef2ff;--muted:#9ca3af;--accent:#8b5cf6;--line:#263044}
*{box-sizing:border-box} body{margin:0;font-family:Inter,ui-sans-serif,system-ui;background:radial-gradient(circle at top left,#1e1b4b,transparent 32rem),var(--bg);color:var(--ink)}
main{max-width:960px;margin:auto;padding:28px} .hero{border:1px solid var(--line);background:rgba(17,24,39,.88);border-radius:24px;padding:28px;box-shadow:0 24px 80px rgba(0,0,0,.35)}
h1{margin:0 0 8px;font-size:clamp(2rem,7vw,4.8rem);line-height:.95;letter-spacing:-.06em} p{color:var(--muted);line-height:1.55} .grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:18px} label{display:block;color:#c7d2fe;font-weight:700;font-size:.9rem} textarea{width:100%;min-height:94px;margin-top:8px;padding:12px;border-radius:16px;border:1px solid var(--line);background:#070a12;color:var(--ink)}
.actions{display:flex;gap:10px;flex-wrap:wrap;margin:18px 0} button{border:0;border-radius:999px;padding:12px 16px;background:var(--accent);color:white;font-weight:800;cursor:pointer} button.secondary{background:#1f2937} pre{white-space:pre-wrap;background:#050713;border:1px solid var(--line);border-radius:18px;padding:16px;color:#dbeafe;min-height:180px} .source{font-size:.85rem;color:var(--muted)}
@media(max-width:760px){.grid{grid-template-columns:1fr} main{padding:16px}}
</style></head><body><main><section class="hero"><div class="source">X Artifact Factory · Source: https://x.com/skcd42/status/2061610972868120587</div><h1>Agent UX Inspectability Checklist</h1><p>Score whether an agent surface exposes enough provenance and background execution state to trust it.</p><div class="grid"><label>Tool/plugin origins visible?<textarea id="origins" placeholder="Type here..."></textarea></label>
<label>Streaming command output?<textarea id="output" placeholder="Type here..."></textarea></label>
<label>Background loop cadence?<textarea id="loops" placeholder="Type here..."></textarea></label>
<label>Parent/session state?<textarea id="state" placeholder="Type here..."></textarea></label>
<label>Copyable audit handoff<textarea id="handoff" placeholder="Type here..."></textarea></label></div><div class="actions"><button onclick="build()">Generate handoff</button><button class="secondary" onclick="copyOut()">Copy markdown</button><button class="secondary" onclick="localStorage.clear();location.reload()">Reset</button></div><pre id="out"></pre></section></main><script>
const fields=['origins','output','loops','state','handoff'];
fields.forEach(id=>{const el=document.getElementById(id); el.value=localStorage.getItem('agent-ux-inspectability-kit:'+id)||''; el.addEventListener('input',()=>localStorage.setItem('agent-ux-inspectability-kit:'+id,el.value));});
function val(id){return document.getElementById(id).value.trim()||'TBD';}
function build(){const lines=['# Agent UX Inspectability Checklist Handoff','','Source: https://x.com/skcd42/status/2061610972868120587','','## Fields']; fields.forEach(id=>lines.push('- '+id.replaceAll('_',' ')+': '+val(id))); lines.push('','## Decision','- [ ] promote','- [ ] iterate','- [ ] hold','', 'Generated: 2026-06-07'); document.getElementById('out').textContent=lines.join('\n');}
async function copyOut(){build(); await navigator.clipboard.writeText(document.getElementById('out').textContent);}
build();
</script></body></html>
